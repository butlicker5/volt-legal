<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volt — Legal</title>
<meta name="description" content="Terms of Service and Privacy Policy for the Volt Discord bot.">
<style>
  :root{--gold:#e7b54a;--gold-soft:#f3d08a;--bg:#0c0a06;--panel:#15120b;--ink:#f4efe4;--dim:#a99c80;--line:#2a2418;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1200px 600px at 50% -10%,#1a1407 0%,var(--bg) 60%);color:var(--ink);
        font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .wrap{max-width:680px;width:100%;text-align:center}
  .bolt{font-size:54px;line-height:1;filter:drop-shadow(0 0 18px rgba(231,181,74,.55))}
  h1{font-size:34px;margin:14px 0 4px;letter-spacing:.5px}
  h1 span{color:var(--gold)}
  .tag{color:var(--dim);margin-bottom:34px;font-size:15px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:560px){.cards{grid-template-columns:1fr}}
  a.card{display:block;text-decoration:none;background:linear-gradient(180deg,var(--panel),#100d07);
        border:1px solid var(--line);border-radius:16px;padding:26px 22px;color:var(--ink);
        transition:.18s border-color,.18s transform}
  a.card:hover{border-color:var(--gold);transform:translateY(-3px)}
  a.card .ic{font-size:26px}
  a.card h2{font-size:18px;margin:10px 0 6px;color:var(--gold-soft)}
  a.card p{color:var(--dim);font-size:13.5px}
  footer{margin-top:36px;color:var(--dim);font-size:13px}
  footer a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bolt">⚡</div>
    <h1><span>Volt</span> — Legal</h1>
    <p class="tag">Terms &amp; data practices for the Volt Discord bot (BPconomy &amp; Coins).</p>
    <div class="cards">
      <a class="card" href="terms-of-service/">
        <div class="ic">📜</div>
        <h2>Terms of Service</h2>
        <p>The rules for using Volt and what you agree to.</p>
      </a>
      <a class="card" href="privacy-policy/">
        <div class="ic">🔒</div>
        <h2>Privacy Policy</h2>
        <p>What data Volt processes, why, and how to remove it.</p>
      </a>
    </div>
    <footer>Last updated: May&nbsp;17,&nbsp;2026 · Contact: <a href="mailto:y810944@gmail.com">y810944@gmail.com</a> · Discord <strong>@aexu</strong></footer>
  </div>
</body>
</html>
